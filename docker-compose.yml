services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE:-false}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - N8N_RUNNERS_ENABLED=true
      - TORCH_INFER_BASE_URL=${TORCH_INFER_BASE_URL:-http://torch-infer:8000}
    volumes:
      - ./n8n-data:/home/node/.n8n
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      llm-server:
        condition: service_started
    restart: unless-stopped

  llm-server:
    build: ./llm-server
    container_name: llm-server
    ports:
      - "${LLM_PORT:-8080}:8080"
    environment:
      - MODEL_REPO=${MODEL_REPO:-QuantFactory/Meta-Llama-3-8B-Instruct-GGUF}
      - MODEL_FILE=${MODEL_FILE:-Meta-Llama-3-8B-Instruct.Q4_K_M.gguf}
      - HOST=0.0.0.0
      - PORT=8080
      - N_CTX=${LLM_CONTEXT_SIZE:-4096}
      - N_GPU_LAYERS=0
      - CHAT_FORMAT=chatml-function-calling
    volumes:
      - ./models:/models
    restart: unless-stopped

  torch-infer:
    build: ./torch-infer
    container_name: torch-infer
    ports:
      - "${TORCH_INFER_PORT:-8000}:8000"
    environment:
      - VISION_SCORE_THRESHOLD=${VISION_SCORE_THRESHOLD:-0.5}
      - TEXT_CANDIDATE_LABELS=${TEXT_CANDIDATE_LABELS:-maintenance_issue,safety_hazard,normal_operation,equipment_failure,environmental_concern}
    volumes:
      - torch-model-cache:/root/.cache/torch
      - hf-model-cache:/root/.cache/huggingface
    profiles:
      - docker
      - full
    restart: unless-stopped

volumes:
  torch-model-cache:
  hf-model-cache:
